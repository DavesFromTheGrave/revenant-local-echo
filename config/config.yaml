# Revenant Echo Configuration
# All tuneable values. No hardcoded settings.

audio:
  # Match the input device by name substring (Windows reorders indexes on
  # every boot). Falls back to PyAudio default if not found.
  # To pin by index instead, set input_device to an integer.
  input_device: "USB 2.0 Camera"
  output_device: null        # null = default system output
  sample_rate: 16000         # STT expects 16kHz
  chunk_size: 1024           # frames per buffer
  vad_rms_threshold: 0.004   # RMS above this = "speech". Low — tuned for the quiet USB cam mic.
  max_record_duration: 30.0  # hard cap on a single speech recording (seconds)

wake_word:
  enabled: true
  # Custom community model: "Hey Friday" (Marvel reference, female AI).
  # Path is project-local so this is portable across machines.
  model: "models/hey_friday.onnx"
  threshold: 0.4             # detection confidence (0-1); community models run lower than bundled
  debug_scores: true         # log the peak score periodically — turn off once tuned

stt:
  model_size: "medium"       # tiny, small, medium, large
  language: "en"
  device: "cuda"             # cuda or cpu
  compute_type: "float16"    # float16 (speed) or int8 (precision)

  # Prompt bias for transcription
  initial_prompt: |
    Speaker uses technical vocabulary and programming terminology.
    Proper nouns: V, Claude, Python, CUDA, Ollama, Chatterbox, OpenCLAW, Revenant.
    Natural pauses mid-sentence are NOT sentence breaks.
    Maintain natural speech cadence without adding punctuation on every breath.

  # VAD tuning
  no_speech_threshold: 0.3   # lower = less aggressive (0.1-0.6)
  silence_duration: 2.0      # seconds of trailing silence to end recording
  vad_min_silence_ms: 500    # whisper internal segment boundary

tts:
  # Chatterbox Turbo with zero-shot voice cloning.
  # Drop a 10-30s WAV of the target voice in models/voice_refs/ and point
  # voice_ref at it. The reference is loaded ONCE on TTS init and cached
  # so per-sentence synthesis only runs the generate step.
  engine: "chatterbox"
  voice_ref: "models/voice_refs/v_combined.wav"
  device: "cuda"

  # Generation knobs (Turbo ignores cfg_weight / min_p / exaggeration)
  temperature: 0.8           # higher = more varied delivery; lower = flatter
  top_p: 0.95
  top_k: 1000
  repetition_penalty: 1.2
  norm_loudness: true        # normalize the reference clip's loudness

listening_window:
  enabled: true
  duration: 5.0              # seconds to listen for follow-ups after V speaks
  max_wait_for_speech: 10.0  # seconds to wait inside a recording for speech to start

models:
  warm_window: 60.0          # seconds STT+TTS stay in VRAM after last activity

backend:
  type: "ollama"             # ollama, megallm, openai, local_echo

  # Turn-level instruction prepended to Ollama prompts. MegaLLM uses a chat
  # system message in backend.py for the same voice-mode behavior.
  brevity_prefix: |
    [Voice mode: respond in 1-2 short sentences. No preamble, no follow-up offers, no explanation unless asked. Be conversational and direct.]

    User:

  ollama:
    endpoint: "http://localhost:11434/api/generate"
    model: "revenant/v-9b"
    temperature: 0.7
    top_p: 0.9
    max_tokens: 120
    timeout: 30
    keep_alive: "5m"

  megallm:
    base_url: "https://ai.megallm.io/v1"
    model: "grok-4.1-fast-reasoning"
    api_key_env: "MEGALLM_API_KEY"
    temperature: 0.7
    top_p: 0.9
    max_tokens: 120
    timeout: 60

  # Legacy OpenAI backend. Not used unless backend.type is "openai".
  # Keep secrets out of this file.
  openai:
    api_key: ""
    model: "gpt-4-turbo"
logging:
  level: "INFO"              # DEBUG, INFO, WARNING, ERROR
  file: "logs/revenant_echo.log"
